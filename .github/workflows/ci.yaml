# Omnixys Workflow Suite – ci.yml
# Purpose: Continuous Integration pipeline for all pushes and pull requests.
# Language: Python (uv)

name: Continuous Integration – Omnixys

on:
  push:
    branches:
      - main
      - '!release'
  pull_request:
    branches:
      - '**'
      - '!release'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read
  issues: write
  pull-requests: write

env:
  COSIGN_EXPERIMENTAL: 'true'
  PYTHON_VERSION: '3.14'
  PACKAGE_NAME: ${{ vars.PACKAGE }}

jobs:
  ci:
    name: Run Lint, Typecheck and Tests
    runs-on: ubuntu-latest
    if: >
      !contains(github.event.head_commit.message, 'chore(version)') &&
      !contains(github.event.head_commit.message, 'docs(changelog)')

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('**/uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint check
        run: uv run ruff check src/

      - name: Typecheck
        run: uv run mypy src/

      - name: Run tests
        run: uv run pytest --tb=short -q
        continue-on-error: true

  release:
    needs: ci
    if: github.ref == 'refs/heads/main'
    outputs:
      released: ${{ steps.semantic.outputs.released }}
      version: ${{ steps.read_version.outputs.version }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install semantic-release
        run: |
          npm install -g semantic-release \
            @semantic-release/changelog \
            @semantic-release/git \
            @semantic-release/github \
            @semantic-release/commit-analyzer \
            @semantic-release/release-notes-generator \
            @semantic-release/exec \
            conventional-changelog-conventionalcommits

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run semantic-release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OUTPUT=$(npx semantic-release 2>&1 || true)
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Published release"; then
            echo "released=true" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

      - name: Read version
        id: read_version
        if: steps.semantic.outputs.released == 'true'
        run: |
          VERSION=$(grep -oP '__version__ = "\K[^"]+' src/omnixys_*/__init__.py | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Update repo variable
        if: steps.semantic.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.OMNIXYS_TOKEN }}
        run: |
          gh variable set CURRENT_VERSION \
            --body "${{ steps.read_version.outputs.version }}" \
            --repo omnixys/${{ env.PACKAGE_NAME }}

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: uv build

      - name: Publish to GitHub Packages
        run: |
          uv publish dist/* \
            --publish-url https://github.com/${{ github.repository_owner }}/${{ env.PACKAGE_NAME }}/packages/pypi \
            --token ${{ secrets.OMNIXYS_TOKEN }}
