name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.14"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check src/

      - name: Typecheck (mypy)
        run: uv run mypy src/ || true

      - name: Test (pytest)
        run: uv run pytest

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      released: ${{ steps.set_outputs.outputs.released }}
      version: ${{ steps.set_outputs.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version before
        id: version_before
        run: echo "version=$(grep -oE '__version__ = "[^"]+"' src/omnixys_security/__init__.py)" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install semantic-release
        run: |
          npm install -g semantic-release
          npm install -g @semantic-release/changelog
          npm install -g @semantic-release/exec
          npm install -g @semantic-release/git
          npm install -g @semantic-release/github
          npm install -g conventional-changelog-conventionalcommits

      - name: Semantic Release
        run: npx semantic-release --no-ci || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version after
        id: version_after
        run: echo "version=$(grep -oE '__version__ = "[^"]+"' src/omnixys_security/__init__.py)" >> $GITHUB_OUTPUT

      - name: Set outputs
        id: set_outputs
        run: |
          BEFORE="${{ steps.version_before.outputs.version }}"
          AFTER="${{ steps.version_after.outputs.version }}"
          echo "version_before: $BEFORE"
          echo "version_after: $AFTER"
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "released=true" >> $GITHUB_OUTPUT
            VERSION=$(echo "$AFTER" | grep -oE '"[^"]+"' | tr -d '"')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          else
            echo "released=false" >> $GITHUB_OUTPUT
          fi

  publish:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: uv build

      - name: Upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "v${{ needs.release.outputs.version }}" dist/* \
            --repo ${{ github.repository }}
